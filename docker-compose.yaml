version: '3.8'

services:
  sanity-app:
    build: .
    container_name: sanity-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=sanity-app
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://carlosedusql.database.windows.net:1433;databaseName=carlosdb;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30
      - SPRING_DATASOURCE_USERNAME=carlosadmin@carlosedusql
      - SPRING_DATASOURCE_PASSWORD=Admin1234
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.SQLServerDialect
      - JWT_SECRET=MiClaveSecretaSuperSeguraParaJWTDebeSerMuyLarga123456789
      - JWT_EXPIRATION=86400000
    restart: unless-stopped
